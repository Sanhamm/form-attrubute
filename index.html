<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content=" practice to make forms in school">
    <title> form school task </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<form action="where/to/send/data" method="GET">
    <ul>
        <li>
            <label for="name">Name:</label>
            <input type="text" id="name" name="User-name">
        </li>
        <li>
            <label for="email">E-mail:</label>
            <input type="email" id="mail" name="User-email">
        </li>
        <li>
            <label for="msg">Message:</label>
            <textarea name="User-msg" id="msg" cols="30" rows="10"></textarea>
        </li>
        <li class="button">
            <button type="submit">send your message </button>
        </li>
    </ul>

</form>
</body>
</html>
